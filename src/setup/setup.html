<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P-Stream Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="setup.css" />
  </head>
  <body>
    <div class="container">
      <h1>P-Stream Setup</h1>
      <p>Please enter the domain or IP address of your self-hosted P-Stream server.</p>
      <div class="form">
        <input type="text" id="domain-input" placeholder="pstream.example.com" />
        <button id="save-button">Save and Continue</button>
      </div>
      <p class="error" id="error-message"></p>
    </div>
    <script src="setup.js"></script>
  </body>
</html>
